spring.application.name=parcialempresa

# ============================================
# PostgreSQL Database (LOCAL)
# ============================================
# Ajusta estos valores segun tu instalacion de PostgreSQL local.
# Por defecto asume:
#   - PostgreSQL corriendo en localhost:5432
#   - Base de datos llamada "parcialdb" (debes crearla primero)
#   - Usuario "postgres" con password "postgres"
spring.datasource.url=jdbc:postgresql://localhost:5432/parcial
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# HikariCP Connection Pool
# ============================================
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=5

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# Server
# ============================================
server.port=9090
